<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList</title>

    <style>
    .todo-field{
        background-color: lemonchiffon;
        margin: 24px;
        padding: 12px;
        border-radius: 12px;
        width: 400px;
    }

    .title{
        margin-top: 12px;
        font-size: 32px;
    }

    .created{
        background-color: rgb(43, 128, 197);
        color: white;
        border-radius: 6px;
        padding: 3px;
    }

    .content{
        border-radius: 12px;
        color: rgb(170,94,94);
        padding: 12px;
    }

    .completed{
        color:blue;
    }

    .important{
        color:red;
    }

    </style>

</head>


<body>
    
    <h1>待辦事項列表</h1>
    <a href="{% url 'todo-create' %}">新增Todo</a>
    {% for todo in todos %}
    <div class="todo-field">
        <small class="created">{{todo.created}}</small>

        {% if todo.important %}
        <span class="important">重要</span>
        {% endif %}

        {% if todo.completed %}
        <span class="completed">完成</span>
        {% endif %}

        <div class="title">{{todo.title}}</div>

        {% if todo.content %}
        <div class="content">{{todo.content|linebreaks}}</div>        
        {% endif %}

        <a href="{% url 'todo-delete' todo.id %}"
        onclick="return confirm('是否確定刪除?!')">刪除</a>



    </div>

    {% endfor %}

</body>


</html>
