{% extends 'base.html' %} 
<!--原本前面語法與base.html重複，故用jinja語法繼承即可-->

{% block head %}
<title>更新待辦頁面</title>
<style>
    body{
        background-color: rgb(190, 217, 230);
    }
</style>
{% endblock %}

{% block content %}

<h1>更新待辦事項</h1>
<form action="" method="POST">
    {% csrf_token %}
    {{form.as_p}}

    <button type="submit">確認</button>
</form>

{% if message %}
{{message}}
{% endif %}
{% endblock %}
